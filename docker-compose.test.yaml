services:
  db:
    image: postgres:18.1-alpine
    container_name: notetify-db-test
    networks:
      - notetify-net
    restart: "no"
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-U",
          "${POSTGRES_USER:-postgres}",
          "-d",
          "${POSTGRES_DB:-notetify_test}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    user: postgres
    tmpfs:
      - /var/lib/postgresql/data
    environment:
      - POSTGRES_DB=notetify_test
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m

  redis:
    image: redis:8.0.1-alpine
    container_name: notetify-redis-test
    networks:
      - notetify-net
    restart: "no"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    ports:
      - "6380:6379"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m

  api:
    build:
      context: ./api
      dockerfile: docker/Dockerfile
      target: development
    container_name: notetify-api-test
    networks:
      - notetify-net
    restart: "no"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:80/api/up",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "8001:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=testing
      - APP_DEBUG=true
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=notetify_test
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=15
      - CACHE_STORE=array
      - SESSION_DRIVER=array
      - QUEUE_CONNECTION=sync
      - MAIL_MAILER=array
      - FILESYSTEM_DISK=local
      - TELESCOPE_ENABLED=false
      - PULSE_ENABLED=false
    volumes:
      - ./api:/app
      - api_vendor:/app/vendor
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  test:
    build:
      context: ./api
      dockerfile: docker/Dockerfile
      target: development
    container_name: notetify-test-runner
    networks:
      - notetify-net
    profiles:
      - tools
    command: ["php", "artisan", "test", "--parallel"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=testing
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=notetify_test
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=15
      - CACHE_STORE=array
      - SESSION_DRIVER=array
      - QUEUE_CONNECTION=sync
      - MAIL_MAILER=array
      - FILESYSTEM_DISK=local
    volumes:
      - ./api:/app
      - api_vendor:/app/vendor

  collab:
    build:
      context: ./collab
      dockerfile: docker/Dockerfile
      target: development
    container_name: notetify-collab-test
    networks:
      - notetify-net
    profiles:
      - e2e
    restart: "no"
    command: ["pnpm", "dev"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://127.0.0.1:1234 || exit 0",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./collab:/app
      - collab_node_modules:/app/node_modules
    ports:
      - "1235:1234"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - COLLAB_JWT_SECRET=${COLLAB_JWT_SECRET}
      - WEBHOOK_SECRET=${COLLAB_WEBHOOK_SECRET}
      - LARAVEL_URL=${LARAVEL_URL:-http://api:80}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  client:
    build:
      context: ./client
      dockerfile: docker/Dockerfile
      target: development
      args:
        - VITE_BASE_URL=http://localhost:8001/api/
        - VITE_WS_ORIGIN=ws://localhost:1235
        - VITE_APP_NAME=Notetify
        - VITE_CLIENT_URL=http://localhost:3001/
    container_name: notetify-client-test
    networks:
      - notetify-net
    profiles:
      - e2e
    restart: "no"
    command: ["pnpm", "test"]
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_healthy
      collab:
        condition: service_started
    volumes:
      - ./client:/app
      - node_modules:/app/node_modules
    environment:
      - VITE_BASE_URL=http://localhost:8001/api/
      - VITE_WS_ORIGIN=ws://localhost:1235
      - VITE_APP_NAME=Notetify
      - VITE_CLIENT_URL=http://localhost:3001/

  # ---------------------------------------------------------------------------
  # cypress — headless e2e runner (e2e profile only)
  # Runs the Cypress suite against the test client. Exits when the suite
  # finishes. Activate with `--profile e2e`.
  # ---------------------------------------------------------------------------
  cypress:
    image: cypress/included:13.13.0
    container_name: notetify-cypress
    networks:
      - notetify-net
    profiles:
      - e2e
    depends_on:
      client:
        condition: service_started
      api:
        condition: service_healthy
      collab:
        condition: service_started
    working_dir: /e2e
    environment:
      - CYPRESS_baseUrl=http://client:3000
    volumes:
      - ./client:/e2e

networks:
  notetify-net:
    driver: bridge

# Note: vendor/node_modules volumes cache installs between runs so `up` is
# fast. Everything else is tmpfs or unmounted.
volumes:
  api_vendor:
  node_modules:
  collab_node_modules:
