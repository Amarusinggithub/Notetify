name: COLLAB CI Pipeline

on:
  push:
    branches:
      - main
      - 'feat/**'
    paths:
      - "collab/**"
      - ".github/workflows/collab-ci.yml"

  pull_request:
    branches:
      - main
    paths:
      - "collab/**"
      - ".github/workflows/collab-ci.yml"

jobs:
  build:
    name: "Typecheck, Test & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "collab"

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: "collab/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test --run

      - name: Coverage
        run: pnpm run coverage

      - name: Build
        run: pnpm run build
