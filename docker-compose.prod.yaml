# =============================================================================
# Notetify — production stack
# =============================================================================

# Shared logging defaults — JSON file with rotation, suitable for CloudWatch
# agent ingestion. Switch driver to `awslogs` if running on ECS or if you'd
# rather have Docker stream directly.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"

services:
  db:
    image: postgres:18.1-alpine
    container_name: notetify-db
    networks:
      - notetify-net
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-U",
          "${POSTGRES_USER:-postgres}",
          "-d",
          "${POSTGRES_DB:-notetify}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    user: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_DATABASE:-notetify}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set in .env.production}
    expose:
      - 5432
    env_file:
      - .env.production
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "0.5"
          memory: 512m

  api:
    build:
      context: ./api
      dockerfile: docker/Dockerfile.prod
      target: production
    container_name: notetify-api
    networks:
      - notetify-net
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:80/api/up",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_started
    env_file:
      - .env.production
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=notetify
      - DB_USERNAME=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RUSTFS_ENDPOINT=http://rustfs:9000
      - FILESYSTEM_DISK=rustfs
    volumes:
      - api-storage:/app/storage
    expose:
      - 80
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
        reservations:
          cpus: "0.5"
          memory: 512m

  collab:
    build:
      context: ./collab
      dockerfile: docker/Dockerfile.prod
      target: production
    container_name: notetify-collab
    networks:
      - notetify-net
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:1234/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      - PORT=1234
      - LARAVEL_URL=http://api:80
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    expose:
      - 1234
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768m
        reservations:
          cpus: "0.1"
          memory: 128m

  client:
    build:
      context: ./client
      dockerfile: docker/Dockerfile.prod
      target: production
      args:
        - VITE_BASE_URL=${CLIENT_BASE_URL:-https://localhost/api/}
        - VITE_WS_ORIGIN=${CLIENT_WS_ORIGIN:-wss://localhost}
        - VITE_APP_NAME=Notetify
        - VITE_CLIENT_URL=${CLIENT_URL:-https://localhost/}
    container_name: notetify-client
    networks:
      - notetify-net
    restart: always
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
      collab:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./certbot/conf:/etc/nginx/certs:ro
      - ./certbot/www:/var/www/certbot:ro
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256m
        reservations:
          cpus: "0.1"
          memory: 64m

  certbot:
    image: certbot/certbot
    container_name: certbot
    profiles:
      - production
    restart: always
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m
networks:
  notetify-net:
    driver: bridge

volumes:
  db-data:
  api-storage:
